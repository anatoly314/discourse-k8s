# =============================================================================
# Helm chart CI/CD
# =============================================================================
# Lints and validates the Discourse Helm chart on every push/PR.
# Packages and pushes to GHCR as an OCI artifact only on tag push
# matching `chart/v*`.
#
# Trigger examples:
#   git tag chart/v0.1.0 && git push origin chart/v0.1.0
# =============================================================================

name: Helm

on:
  push:
    branches: [main]
    paths: ["chart/**"]
    tags: ["chart/v*"]
  pull_request:
    paths: ["chart/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint chart/

      - name: Validate templates render
        run: |
          helm template test chart/ \
            --set image.repository=test \
            --set discourse.hostname=test.example.com \
            --set discourse.database.host=postgres.svc

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/chart/v')
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR OCI registry
        run: |
          helm registry login ghcr.io \
            -u "${{ github.actor }}" \
            -p "${{ github.token }}"

      - name: Extract version from tag
        id: version
        run: |
          # Strip "chart/v" prefix (e.g., chart/v0.1.0 -> 0.1.0)
          VERSION="${GITHUB_REF#refs/tags/chart/v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.value }}/" chart/Chart.yaml
          echo "Chart.yaml after version update:"
          grep -E '^(version|appVersion):' chart/Chart.yaml

      - name: Package chart
        run: helm package chart/

      - name: Push chart to GHCR
        run: |
          helm push "discourse-${{ steps.version.outputs.value }}.tgz" \
            oci://ghcr.io/anatoly314/helm-charts
