# =============================================================================
# Docker image CI/CD
# =============================================================================
# Builds the custom Discourse image (Nfrastack base + plugins + precompiled
# assets). Pushes to GHCR only on tag push matching `docker/v*`.
#
# Trigger examples:
#   git tag docker/v2026.2.1 && git push origin docker/v2026.2.1
#
# Note: `paths` filters are ignored for tag pushes (GitHub Actions behavior),
# so pushing a `docker/v*` tag always triggers regardless of which files changed.
# =============================================================================

name: Docker

on:
  push:
    branches: [main]
    paths: ["docker/**"]
    tags: ["docker/v*"]
  pull_request:
    paths: ["docker/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/docker/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/docker/v* ]]; then
            # Strip the "docker/" prefix, keep the "v" (e.g., docker/v2026.2.1 -> v2026.2.1)
            VERSION="${GITHUB_REF#refs/tags/docker/}"
            echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/anatoly314/discourse-k8s
          tags: |
            # On tag push: use the version from the tag + latest
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ steps.version.outputs.is_release }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_release }}
            # On main push / PR: SHA-based tag for build validation
            type=sha,enable=${{ steps.version.outputs.is_release == 'false' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/
          push: ${{ steps.version.outputs.is_release == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # DISCOURSE_VERSION is pinned in the Dockerfile (e.g., v2026.3.0-latest).
          # Our docker/v* tags version the IMAGE, not Discourse itself.
          # Only override DISCOURSE_VERSION if you need a different Discourse release.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
