apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "discourse.fullname" . }}
  labels:
    {{- include "discourse.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "discourse.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if include "discourse.createSecret" . }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "discourse.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "discourse.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: {{ .Values.restartPolicy }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

      initContainers:
        # ---- Redis (native sidecar, K8s 1.28+) ----
        # restartPolicy: Always makes this a "sidecar" init container:
        # it starts BEFORE other init containers and keeps running alongside
        # regular containers. This ensures Redis is available for migrations
        # (Discourse's db:migrate acquires a distributed mutex via Redis).
        - name: redis
          image: {{ include "discourse.redisImage" . }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          restartPolicy: Always
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        {{- if .Values.initContainers.waitForPostgres.enabled }}
        # ---- Wait for PostgreSQL to be reachable ----
        - name: wait-for-postgres
          image: "{{ .Values.initContainers.waitForPostgres.image.repository }}:{{ .Values.initContainers.waitForPostgres.image.tag }}"
          imagePullPolicy: {{ .Values.initContainers.waitForPostgres.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at ${DISCOURSE_DB_HOST}:${DISCOURSE_DB_PORT}..."
              until nc -z "${DISCOURSE_DB_HOST}" "${DISCOURSE_DB_PORT}"; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is reachable."
          env:
            - name: DISCOURSE_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "discourse.configmapName" . }}
                  key: DISCOURSE_DB_HOST
            - name: DISCOURSE_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "discourse.configmapName" . }}
                  key: DISCOURSE_DB_PORT
        {{- end }}

        # ---- Run database migrations ----
        - name: migrate
          image: {{ include "discourse.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bundle", "exec", "rake", "db:migrate"]
          envFrom:
            - configMapRef:
                name: {{ include "discourse.configmapName" . }}
          {{- if include "discourse.hasEnvVars" . }}
          env:
            {{- include "discourse.secretEnvVars" . | nindent 12 }}
            {{- with .Values.discourse.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}

        # ---- Create admin user (first boot only, idempotent) ----
        {{- if or .Values.discourse.admin.existingSecret .Values.discourse.admin.password }}
        - name: create-admin
          image: {{ include "discourse.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bundle", "exec", "rails", "runner"]
          args:
            - |
              email = ENV['DISCOURSE_DEVELOPER_EMAILS']&.split(',')&.first&.strip
              email = ENV['DISCOURSE_ADMIN_EMAIL'] if ENV['DISCOURSE_ADMIN_EMAIL'].present?
              abort "No admin email configured" if email.blank?

              if User.find_by_email(email)
                puts "Admin already exists: #{email}"
              else
                password = ENV['DISCOURSE_ADMIN_PASSWORD']
                abort "DISCOURSE_ADMIN_PASSWORD not set" if password.blank?

                username = ENV.fetch('DISCOURSE_ADMIN_USERNAME', email.split('@').first)
                name = ENV.fetch('DISCOURSE_ADMIN_NAME', 'Admin')

                user = User.new(
                  email: email,
                  username: UserNameSuggester.suggest(username),
                  name: name,
                  password: password,
                  active: true,
                  approved: true
                )
                user.save!
                user.grant_admin!
                user.change_trust_level!(TrustLevel[1]) if user.trust_level < 1
                user.email_tokens.update_all(confirmed: true)
                user.activate
                puts "Admin created: #{email} (username: #{user.username})"
              end
          envFrom:
            - configMapRef:
                name: {{ include "discourse.configmapName" . }}
          env:
            {{- include "discourse.secretEnvVars" . | nindent 12 }}
            - name: DISCOURSE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.secretName" .) .Values.discourse.admin.existingSecret }}
                  key: {{ .Values.discourse.admin.secretKey }}
            {{- if .Values.discourse.admin.email }}
            - name: DISCOURSE_ADMIN_EMAIL
              value: {{ .Values.discourse.admin.email | quote }}
            {{- end }}
            {{- if .Values.discourse.admin.username }}
            - name: DISCOURSE_ADMIN_USERNAME
              value: {{ .Values.discourse.admin.username | quote }}
            {{- end }}
            {{- if .Values.discourse.admin.name }}
            - name: DISCOURSE_ADMIN_NAME
              value: {{ .Values.discourse.admin.name | quote }}
            {{- end }}
            {{- with .Values.discourse.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- end }}

      containers:
        # ---- Pitchfork web server (Discourse's unicorn successor, port 3000) ----
        - name: web
          image: {{ include "discourse.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bundle", "exec", "pitchfork", "-E", "production", "-c", "config/pitchfork.conf.rb"]
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "discourse.configmapName" . }}
          {{- if include "discourse.hasEnvVars" . }}
          env:
            {{- include "discourse.secretEnvVars" . | nindent 12 }}
            {{- with .Values.discourse.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /srv/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /srv/status
              port: http
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /srv/status
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            {{- if .Values.persistence.uploads.enabled }}
            - name: uploads
              mountPath: {{ .Values.persistence.uploads.mountPath }}
            {{- end }}
            {{- if .Values.persistence.backups.enabled }}
            - name: backups
              mountPath: {{ .Values.persistence.backups.mountPath }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        # ---- Sidekiq (background job processor) ----
        - name: sidekiq
          image: {{ include "discourse.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ include "discourse.sidekiqCommand" . }}
          envFrom:
            - configMapRef:
                name: {{ include "discourse.configmapName" . }}
          {{- if include "discourse.hasEnvVars" . }}
          env:
            {{- include "discourse.secretEnvVars" . | nindent 12 }}
            {{- with .Values.discourse.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          startupProbe:
            exec:
              command: ["pgrep", "-f", "sidekiq"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "sidekiq"]
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pgrep", "-f", "sidekiq"]
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            {{- if .Values.persistence.uploads.enabled }}
            - name: uploads
              mountPath: {{ .Values.persistence.uploads.mountPath }}
            {{- end }}
            {{- if .Values.persistence.backups.enabled }}
            - name: backups
              mountPath: {{ .Values.persistence.backups.mountPath }}
            {{- end }}
          {{- with .Values.sidekiq.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      volumes:
        - name: redis-data
          emptyDir: {}
        {{- if .Values.persistence.uploads.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "discourse.uploadsPvcName" . }}
        {{- end }}
        {{- if .Values.persistence.backups.enabled }}
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "discourse.backupsPvcName" . }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
