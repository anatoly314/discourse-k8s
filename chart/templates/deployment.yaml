apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "discourse.fullname" . }}
  labels:
    {{- include "discourse.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "discourse.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if include "discourse.createSecret" . }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "discourse.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "discourse.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: {{ .Values.restartPolicy }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

      {{- if .Values.initContainers.waitForPostgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.initContainers.waitForPostgres.image.repository }}:{{ .Values.initContainers.waitForPostgres.image.tag }}"
          imagePullPolicy: {{ .Values.initContainers.waitForPostgres.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at ${DB_HOST}:${DB_PORT}..."
              until nc -z "${DB_HOST}" "${DB_PORT}"; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is reachable."
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "discourse.configmapName" . }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "discourse.configmapName" . }}
                  key: DB_PORT
      {{- end }}

      containers:
        # ---- Discourse (Unicorn + Sidekiq via s6-overlay) ----
        - name: discourse
          image: {{ include "discourse.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "discourse.configmapName" . }}
          env:
            # -- Database password --
            {{- if or .Values.discourse.database.existingSecret (and (include "discourse.createSecret" .) .Values.discourse.database.password) }}
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.secretName" .) .Values.discourse.database.existingSecret }}
                  key: {{ .Values.discourse.database.secretKey }}
            {{- end }}
            # -- SMTP password --
            {{- if or .Values.discourse.smtp.existingSecret (and (include "discourse.createSecret" .) .Values.discourse.smtp.password) }}
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.secretName" .) .Values.discourse.smtp.existingSecret }}
                  key: {{ .Values.discourse.smtp.secretKey }}
            {{- end }}
            # -- Secret key base --
            {{- if or .Values.discourse.secretKeyBase.existingSecret (and (include "discourse.createSecret" .) .Values.discourse.secretKeyBase.value) }}
            - name: DISCOURSE_SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.secretName" .) .Values.discourse.secretKeyBase.existingSecret }}
                  key: {{ .Values.discourse.secretKeyBase.secretKey }}
            {{- end }}
            # -- Admin password --
            {{- if or .Values.discourse.admin.existingSecret (and (include "discourse.createSecret" .) .Values.discourse.admin.password) }}
            - name: ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.secretName" .) .Values.discourse.admin.existingSecret }}
                  key: {{ .Values.discourse.admin.secretKey }}
            {{- end }}
            {{- with .Values.discourse.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /srv/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /srv/status
              port: http
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /srv/status
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            {{- if .Values.persistence.uploads.enabled }}
            - name: uploads
              mountPath: /data/uploads
            {{- end }}
            {{- if .Values.persistence.backups.enabled }}
            - name: backups
              mountPath: /data/backups
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        # ---- Redis sidecar (ephemeral, no PVC) ----
        - name: redis
          image: {{ include "discourse.redisImage" . }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      volumes:
        - name: redis-data
          emptyDir: {}
        {{- if .Values.persistence.uploads.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "discourse.uploadsPvcName" . }}
        {{- end }}
        {{- if .Values.persistence.backups.enabled }}
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "discourse.backupsPvcName" . }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
