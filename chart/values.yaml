# =============================================================================
# Discourse Helm Chart — values.yaml
# =============================================================================
# Deploys Discourse on Kubernetes using the Nfrastack base image with a Redis
# sidecar. See CLAUDE.md and .docs/specifications.md for architecture details.
# =============================================================================

# ---------------------------------------------------------------------------
# Discourse container image
# ---------------------------------------------------------------------------
# You MUST set image.repository to your custom-built Discourse image
# (extends ghcr.io/nfrastack/container-discourse with baked-in plugins).
# If tag is empty, defaults to Chart.appVersion.
image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Redis sidecar
# ---------------------------------------------------------------------------
# Ephemeral Redis in the same pod (no PVC). Used for Sidekiq job queue,
# caching, and MessageBus. NOT a data store — PostgreSQL is the source
# of truth.
redis:
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi

# ---------------------------------------------------------------------------
# Discourse configuration
# ---------------------------------------------------------------------------
discourse:
  # REQUIRED — the public hostname for the forum (e.g. forum.example.com)
  hostname: ""

  # REQUIRED for first boot — comma-separated emails that get initial admin
  developerEmails: ""

  # -- Admin account (first boot only) --
  admin:
    username: "admin"
    email: ""
    name: "Admin User"
    # Inline password (>= 10 chars). Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for admin password
    existingSecret: ""
    secretKey: admin-password

  # -- PostgreSQL (external, e.g. CNPG) --
  database:
    host: ""
    port: 5432
    name: discourse
    username: discourse
    pool: 8
    # Inline password. Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for the database password
    existingSecret: ""
    secretKey: db-password

  # -- Redis --
  # Defaults point to the sidecar at localhost. Override only if using an
  # external Redis.
  redis:
    host: localhost
    port: 6379
    db: 0

  # -- SMTP --
  smtp:
    address: ""
    port: 587
    domain: ""
    username: ""
    authentication: plain
    enableStartTls: true
    # Inline password. Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for the SMTP password
    existingSecret: ""
    secretKey: smtp-password

  # -- Secret key base (Rails) --
  # 128-char hex string: openssl rand -hex 64
  secretKeyBase:
    # Inline value. Ignored if existingSecret is set.
    value: ""
    # Use an existing Secret for the secret key base
    existingSecret: ""
    secretKey: secret-key-base

  # -- Serving --
  # Serve static assets directly from Unicorn (no nginx in front)
  serveStaticAssets: true
  # Force HTTPS — maps to DELIVER_SECURE_ASSETS in Nfrastack
  forceHttps: true

  # -- Performance tuning --
  unicornWorkers: 4
  sidekiqThreads: 5

  # -- Startup behavior --
  # Run database migrations on startup (recommended)
  enableDbMigrate: true
  # Precompile assets on startup — leave false, bake into Docker image instead
  enablePrecompileAssets: false

  # NOTE: Nfrastack hardcodes Rails logging to a file, not stdout.
  # Use LOG_PATH/LOG_FILE env vars or a log-tailing sidecar if you need
  # kubectl logs for Rails output. RAILS_LOG_TO_STDOUT is silently ignored.

  # -- Plugins --
  # Enable/disable plugins bundled in the image. Keys are plugin short names,
  # values are booleans. Maps to PLUGIN_ENABLE_<UPPER_NAME>=TRUE|FALSE.
  # Example:
  #   plugins:
  #     openid-connect: true
  #     solved: true
  #     chat: true
  #     ai: false
  plugins: {}

  # -- Extra environment variables --
  # Passed directly to the Discourse container. Use for any env vars not
  # covered above.
  # Example:
  #   extraEnv:
  #     - name: TIMEZONE
  #       value: "UTC"
  #     - name: DISCOURSE_S3_BUCKET
  #       valueFrom:
  #         secretKeyRef:
  #           name: my-secret
  #           key: s3-bucket
  extraEnv: []

# ---------------------------------------------------------------------------
# Init containers
# ---------------------------------------------------------------------------
initContainers:
  waitForPostgres:
    enabled: true
    image:
      repository: busybox
      tag: "1.37"
      pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Persistent storage
# ---------------------------------------------------------------------------
persistence:
  # User uploads, avatars, attachments — mounted at /data/uploads
  uploads:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""

  # Database backup archives — mounted at /data/backups
  backups:
    enabled: false
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example:
  #   hosts:
  #     - host: forum.example.com
  #       paths:
  #         - path: /
  #           pathType: Prefix
  hosts: []
  # Example:
  #   tls:
  #     - secretName: forum-tls
  #       hosts:
  #         - forum.example.com
  tls: []

# ---------------------------------------------------------------------------
# Discourse container resources
# ---------------------------------------------------------------------------
resources:
  requests:
    memory: 1Gi
    cpu: 500m
  limits:
    memory: 2Gi

# ---------------------------------------------------------------------------
# Service account
# ---------------------------------------------------------------------------
serviceAccount:
  create: false
  annotations: {}
  name: ""

# ---------------------------------------------------------------------------
# Pod scheduling
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Pod metadata and security
# ---------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}
podSecurityContext: {}

# NOTE: The Discourse container starts as root for s6-overlay init, then
# drops privileges to the discourse user (uid 9009). Do NOT set runAsNonRoot
# or drop ALL capabilities — it will break the s6-overlay init process.
securityContext: {}

restartPolicy: Always
terminationGracePeriodSeconds: 60
