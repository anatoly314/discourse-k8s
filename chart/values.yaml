# =============================================================================
# Discourse Helm Chart -- values.yaml
# =============================================================================
# Deploys Discourse on Kubernetes using a slim-based custom image with separate
# Unicorn and Sidekiq containers plus a Redis sidecar.
# See CLAUDE.md for architecture details.
# =============================================================================

# ---------------------------------------------------------------------------
# Discourse container image
# ---------------------------------------------------------------------------
# You MUST set image.repository to your custom-built Discourse image
# (extends discourse/base:slim with baked-in plugins and precompiled assets).
# If tag is empty, defaults to Chart.appVersion.
image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Redis sidecar
# ---------------------------------------------------------------------------
# Ephemeral Redis in the same pod (no PVC). Used for Sidekiq job queue,
# caching, and MessageBus. NOT a data store -- PostgreSQL is the source
# of truth.
redis:
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi

# ---------------------------------------------------------------------------
# Discourse configuration
# ---------------------------------------------------------------------------
discourse:
  # REQUIRED -- the public hostname for the forum (e.g. forum.example.com)
  hostname: ""

  # REQUIRED for first boot -- comma-separated emails that get initial admin
  developerEmails: ""

  # -- Admin account (first boot only) --
  admin:
    username: "admin"
    email: ""
    name: "Admin User"
    # Inline password (>= 10 chars). Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for admin password
    existingSecret: ""
    secretKey: admin-password

  # -- PostgreSQL (external, e.g. CNPG) --
  database:
    host: ""
    port: 5432
    name: discourse
    username: discourse
    pool: 8
    # Inline password. Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for the database password
    existingSecret: ""
    secretKey: db-password

  # -- Redis --
  # Defaults point to the sidecar at localhost. Override only if using an
  # external Redis.
  redis:
    host: localhost
    port: 6379

  # -- SMTP --
  smtp:
    address: ""
    port: 587
    domain: ""
    username: ""
    authentication: plain
    enableStartTls: true
    # Inline password. Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for the SMTP password
    existingSecret: ""
    secretKey: smtp-password

  # -- Secret key base (Rails) --
  # 128-char hex string: openssl rand -hex 64
  secretKeyBase:
    # Inline value. Ignored if existingSecret is set.
    value: ""
    # Use an existing Secret for the secret key base
    existingSecret: ""
    secretKey: secret-key-base

  # -- Serving --
  # Serve static assets directly from Unicorn (no nginx in front)
  serveStaticAssets: true
  # Force HTTPS -- sets DISCOURSE_FORCE_HTTPS=true
  forceHttps: true

  # -- Performance tuning --
  # Number of Unicorn worker processes (Discourse default: 3)
  unicornWorkers: 3
  # Sidekiq concurrency (number of threads processing background jobs)
  sidekiqConcurrency: 5

  # -- Extra environment variables --
  # Passed directly to all Discourse containers (unicorn, sidekiq, migrate).
  # Use for any env vars not covered above.
  # Example:
  #   extraEnv:
  #     - name: DISCOURSE_S3_BUCKET
  #       value: "my-bucket"
  #     - name: DISCOURSE_S3_SECRET_ACCESS_KEY
  #       valueFrom:
  #         secretKeyRef:
  #           name: my-secret
  #           key: s3-secret
  extraEnv: []

# ---------------------------------------------------------------------------
# Sidekiq container resources
# ---------------------------------------------------------------------------
# Separate resource configuration for the Sidekiq container.
sidekiq:
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi

# ---------------------------------------------------------------------------
# Init containers
# ---------------------------------------------------------------------------
initContainers:
  waitForPostgres:
    enabled: true
    image:
      repository: busybox
      tag: "1.37"
      pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Persistent storage
# ---------------------------------------------------------------------------
# Mount paths use standard Discourse layout under /var/www/discourse.
persistence:
  # User uploads, avatars, attachments
  uploads:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""
    # Mount path inside the container
    mountPath: /var/www/discourse/public/uploads

  # Database backup archives
  backups:
    enabled: false
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""
    # Mount path inside the container
    mountPath: /var/www/discourse/public/backups

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example:
  #   hosts:
  #     - host: forum.example.com
  #       paths:
  #         - path: /
  #           pathType: Prefix
  hosts: []
  # Example:
  #   tls:
  #     - secretName: forum-tls
  #       hosts:
  #         - forum.example.com
  tls: []

# ---------------------------------------------------------------------------
# Unicorn container resources
# ---------------------------------------------------------------------------
resources:
  requests:
    memory: 1Gi
    cpu: 500m
  limits:
    memory: 2Gi

# ---------------------------------------------------------------------------
# Service account
# ---------------------------------------------------------------------------
serviceAccount:
  create: false
  annotations: {}
  name: ""

# ---------------------------------------------------------------------------
# Pod scheduling
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Pod metadata and security
# ---------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

restartPolicy: Always
terminationGracePeriodSeconds: 60
